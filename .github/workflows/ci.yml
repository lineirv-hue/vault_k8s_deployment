name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  sanity-check:
    runs-on: [self-hosted, macos]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.5"

      - name: Verify shell scripts
        run: |
          if ! command -v shellcheck >/dev/null 2>&1; then
            if command -v apt-get >/dev/null 2>&1; then
              sudo apt-get update -y
              sudo apt-get install -y shellcheck
            elif command -v brew >/dev/null 2>&1; then
              if [[ "$(uname -m)" == "arm64" ]]; then
                arch -arm64 brew install shellcheck || true
              else
                brew install shellcheck || true
              fi
            fi
          fi
          if command -v shellcheck >/dev/null 2>&1; then
            find scripts -name '*.sh' -print0 | xargs -0 shellcheck
          else
            echo "shellcheck not installed, skipping shell linting"
          fi
          find scripts -name '*.sh' -print0 | xargs -0 bash -n

      - name: Terraform fmt check
        working-directory: terraform
        run: |
          terraform fmt -check -recursive

      - name: Terraform init
        working-directory: terraform
        run: |
          terraform init -input=false

      - name: Terraform validate
        working-directory: terraform
        run: |
          terraform validate

      - name: Check kubeconfig connectivity
        run: |
          if ! kubectl cluster-info >/dev/null 2>&1; then
            echo "Warning: kubeconfig not reachable — skipping terraform plan"
            echo "SKIP_PLAN=true" >> "$GITHUB_ENV"
          else
            echo "SKIP_PLAN=false" >> "$GITHUB_ENV"
          fi

      - name: Terraform plan
        if: env.SKIP_PLAN != 'true'
        working-directory: terraform
        run: |
          terraform plan -input=false -var-file=terraform.tfvars.json
