name: Deploy Vault Terraform

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, macos]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.5"

      - name: Cleanup existing Kubernetes resources
        run: |
          kubectl delete configmap vault-config vault-logrotate --ignore-not-found
          kubectl delete pvc vault-data-pvc --ignore-not-found
          kubectl delete pv vault-data-pv --ignore-not-found
          kubectl delete deployment vault --ignore-not-found
          kubectl delete service vault --ignore-not-found

      - name: Deploy Vault
        run: bash scripts/terraform-deploy.sh
